<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Idea Generator Pro</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
margin:0;
padding:20px;
}

.box{
background:rgba(255,255,255,0.1);
padding:20px;
max-width:500px;
margin:auto;
border-radius:15px;
}

input,select{
width:90%;
padding:10px;
margin:8px;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
}

.result{
background:white;
color:black;
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
}

</style>
</head>

<body>

<h1>🧠 Content Idea Generator Pro</h1>

<div class="box">

<select id="lang">
<option value="en">English</option>
<option value="uz">O'zbek</option>
</select>

<input id="topic" placeholder="Enter topic (fitness, business, education)">

<button onclick="generate()">Generate Ideas</button>

<div id="result"></div>

</div>

<script>

function generate(){

let topic=document.getElementById("topic").value.toLowerCase();
let lang=document.getElementById("lang").value;

let data={
fitness:{
en:[
"Instagram: 5 mistakes beginners make in fitness",
"YouTube: 30 day fitness transformation",
"TikTok: What I eat in a day for fitness"
],
uz:[
"Instagram: Fitnesda 5 ta asosiy xato",
"YouTube: 30 kunlik transformatsiya",
"TikTok: Bir kunda nima yeyman"
]
},

business:{
en:[
"Instagram: Start business with $0",
"YouTube: 5 business ideas for beginners",
"TikTok: Why people fail in business"
],
uz:[
"Instagram: 0 so‘m bilan biznes boshlash",
"YouTube: Boshlovchilar uchun 5 g‘oya",
"TikTok: Nega odamlar biznesda yutqazadi"
]
},

education:{
en:[
"Instagram: Learn faster techniques",
"YouTube: Study smarter not harder",
"TikTok: Memory hacks for students"
],
uz:[
"Instagram: Tez o‘rganish usullari",
"YouTube: Aqlli o‘qish metodlari",
"TikTok: Xotirani kuchaytirish"
]
},

technology:{
en:[
"Instagram: Future of AI",
"YouTube: Tech trends 2026",
"TikTok: Cool tech facts"
],
uz:[
"Instagram: Texnologiya kelajagi",
"YouTube: 2026 trendlar",
"TikTok: Qiziqarli tex faktlar"
]
},

travel:{
en:[
"Instagram: Hidden travel places",
"YouTube: Travel guide 2026",
"TikTok: Cheap travel hacks"
],
uz:[
"Instagram: Yashirin sayohat joylari",
"YouTube: Sayohat qo‘llanma",
"TikTok: Arzon sayohat usullari"
]
}

};

let ideas=data[topic];

if(!ideas){
document.getElementById("result").innerHTML="❌ Topic topilmadi: fitness, business, education, technology, travel";
return;
}

let output="<div class='result'>";

for(let i=0;i<ideas[lang].length;i++){
output+="<p>👉 "+ideas[lang][i]+"</p>";
}

output+="</div>";

document.getElementById("result").innerHTML=output;

}

</script>

</body>
</html>
