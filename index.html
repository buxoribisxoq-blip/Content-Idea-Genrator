<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Idea Generator Pro</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
margin:0;
padding:20px;
}

.box{
background:rgba(255,255,255,0.1);
padding:20px;
max-width:500px;
margin:auto;
border-radius:15px;
}

input,select{
width:90%;
padding:10px;
margin:8px;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
}

.result{
background:white;
color:black;
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
}

</style>
</head>

<body>

<h1>🧠 Content Idea Generator Pro</h1>

<div class="box">

<select id="lang">
<option value="en">English</option>
<option value="uz">O'zbek</option>
</select>

<input id="topic" placeholder="Enter topic (fitness, business, education)">

<button onclick="generate()">Generate Ideas</button>

<div id="result"></div>

</div>

<script>
  
function getRandom(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

let savedIdeas = [];

function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied!");
}

function saveIdea(text){
savedIdeas.push(text);
alert("Saved!");
}

function showSaved(){
let output="<div class='result'><h3>❤️ Saved Ideas</h3>";

for(let i=0;i<savedIdeas.length;i++){
output+="<p>"+savedIdeas[i]+"</p>";
}

output+="</div>";

document.getElementById("result").innerHTML=output;
}

function generate(){

let topic=document.getElementById("topic").value.toLowerCase();
let lang=document.getElementById("lang").value;

let hooks={
en:["Most people fail at","You are doing this wrong in","This will change your","Nobody talks about","The truth about"],
uz:["Ko‘pchilik xato qiladi","Siz noto‘g‘ri qilyapsiz","Bu hayotingizni o‘zgartiradi","Hech kim gapirmaydi","Haqiqat shuki"]
};

let data={
fitness:["workout","diet","gym","fat loss"],
business:["startup","money","online business","freelancing"],
education:["study","learning","memory","focus"],
motivation:["success","life","discipline","goals"],
technology:["AI","apps","future tech","gadgets"],
travel:["travel","cheap trips","hidden places","adventure"],
finance:["saving money","investing","income","crypto"],
lifestyle:["habits","routine","productivity","self care"],
entertainment:["movies","music","viral videos","fun"],
marketing:["social media","branding","growth","ads"]
};

let list=data[topic];

if(!list){
document.getElementById("result").innerHTML="❌ Topic topilmadi";
return;
}

let output="<div class='result'>";

for(let i=0;i<10;i++){

let hook=getRandom(hooks[lang]);
let item=getRandom(list);

let idea=hook+" "+item;

output+="
<p>
👉 "+idea+"<br>
<button onclick=\"copyText('"+idea+"')\">Copy</button>
<button onclick=\"saveIdea('"+idea+"')\">Save</button>
</p>
<hr>
";

}

output+="<button onclick='showSaved()'>❤️ Show Saved</button></div>";

document.getElementById("result").innerHTML=output;

}

</script>

</body>
</html>
